name: Create Microservice

on:
  workflow_dispatch:
    inputs:
      port_payload:
        required: true
        type: string

jobs:
  create:
    runs-on: ubuntu-latest

    env:
      PORT_RUN_ID:   ${{ fromJson(inputs.port_payload).context.runId }}
      SERVICE_NAME:  ${{ fromJson(inputs.port_payload).payload.properties.service_name }}
      LANGUAGE:      ${{ fromJson(inputs.port_payload).payload.properties.language }}
      CLUSTER_ID:    ${{ fromJson(inputs.port_payload).payload.properties.k8s_cluster }}
      OWNER:         ${{ fromJson(inputs.port_payload).payload.properties.owner }}
      ON_CALL_USER:  ${{ fromJson(inputs.port_payload).payload.properties.on_call_user }}
      DESCRIPTION:   ${{ fromJson(inputs.port_payload).payload.properties.description }}
      GH_ORG:        KfirErlich

    steps:
      - name: Log - Start
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ env.PORT_RUN_ID }}
          logMessage: "🟡 Starting provisioning for service: ${{ env.SERVICE_NAME }}"
          statusLabel: "Creating repository..."

      - name: Create GitHub Repository
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_ADMIN_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/KfirErlich/microservice-template/generate \
            -d "{\"owner\": \"KfirErlich\", \"name\": \"${{ env.SERVICE_NAME }}\", \"description\": \"${{ env.DESCRIPTION }}\", \"private\": false}"

      - name: Log - Repo Created
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ env.PORT_RUN_ID }}
          logMessage: "✅ Repository created: github.com/KfirErlich/${{ env.SERVICE_NAME }}"
          statusLabel: "Registering in Port..."

      - name: Register Microservice in Port
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT_ENTITY
          runId: ${{ env.PORT_RUN_ID }}
          blueprint: microservice
          identifier: ${{ env.SERVICE_NAME }}
          title: ${{ env.SERVICE_NAME }}
          properties: |-
            {
              "language": "${{ env.LANGUAGE }}",
              "description": "${{ env.DESCRIPTION }}",
              "github_url": "https://github.com/KfirErlich/${{ env.SERVICE_NAME }}",
              "owner": "${{ env.OWNER }}",
              "on_call": "${{ env.ON_CALL_USER }}"
            }
          relations: |-
            {
              "k8s_cluster": "${{ env.CLUSTER_ID }}"
            }

      - name: Log - Entity Registered
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ env.PORT_RUN_ID }}
          logMessage: "✅ Microservice registered in Port and linked to cluster: ${{ env.CLUSTER_ID }}"
          statusLabel: "Finalizing..."

      - name: Complete Action Run
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ env.PORT_RUN_ID }}
          status: SUCCESS
          statusLabel: "✅ Microservice live!"
          summary: "${{ env.SERVICE_NAME }} created and linked to cluster ${{ env.CLUSTER_ID }}"
          link: '["https://github.com/KfirErlich/${{ env.SERVICE_NAME }}"]'
          logMessage: "🎉 All done! Service is live and visible in the Port catalog."
